site_name: iREPLY Inventory Management System
theme:
  name: material
  palette: 
    # Light/Dark mode toggle
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom        # Changes the header color
      accent: custom       # Changes the color of links/buttons
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto          # Main text font
    code: Roboto Mono     # Code block font

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.caret

nav:
  - Introduction: index.md
  - Getting Started:
      - Installation Guide: setup/install.md
      - Configuration: setup/config.md
  - User Manual:
      - Overview: manual/overview.md
      - Super Admin Role: manual/super-admin.md
      - Admin Role: manual/admin.md
      - Employee Role: manual/employee.md
  - Inventory Logic:
      - SKU Management: logic/skus.md
      - Database Schema: logic/database.md
  - Troubleshooting: troubleshooting.md
  - Maintenance:
      - Backups: maintenance/backups.md
      - Updating System: maintenance/updates.md